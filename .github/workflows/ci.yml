name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore & Build
        run: dotnet build backend/MevzuatAI.WebAPI/MevzuatAI.WebAPI.csproj --configuration Release

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install & Build
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          GROQ_API_KEY: placeholder-for-ci-build
          NEXT_PUBLIC_API_URL: http://localhost:5023
